events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # [1] HTTP (80) 설정: 현재 가동을 위해 리다이렉트를 잠시 끄고 직접 연결 [cite: 2026-02-25]
    server {
        listen 80;
        server_name localhost; 

        # Certbot 인증용 (인증서 발급 시 반드시 필요함) [cite: 2026-02-02]
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # --- 로컬 확인을 위해 리다이렉트 주석 처리 ---
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # --- 인증서 발급 전까지 80포트에서 서비스를 제공하도록 설정 --- [cite: 2026-02-24]
        # 프론트엔드 연결
        location / {
            proxy_pass http://frontend:80; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # 백엔드 API 연결
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # [2] HTTPS (443) 실제 운영: 인증서 발급 전에는 Nginx가 죽으므로 전체 주석 처리 [cite: 2026-02-25]
    # server {
    #     listen 443 ssl;
    #     server_name localhost;

    #     # SSL 인증서 (Certbot 경로)
    #     ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;

    #     # 프론트엔드 연결 (React)
    #     location / {
    #         proxy_pass http://front:5173; 
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }

    #     # 백엔드 연결 (Spring Boot API)
    #     location /api/ {
    #         proxy_pass http://back:8080;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
